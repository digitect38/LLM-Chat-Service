<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Marked+KaTeX API Test</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"/>
</head><body>
<h2>Marked + KaTeX API Test</h2>
<pre id="log"></pre>
<div id="result" style="border:1px solid #ccc;padding:16px;margin-top:16px;"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script>
var log = document.getElementById('log');
var result = document.getElementById('result');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

L('1. typeof marked = ' + typeof marked);
L('2. typeof marked.parse = ' + typeof marked.parse);
L('3. typeof katex = ' + typeof katex);
L('4. typeof katex.renderToString = ' + typeof katex.renderToString);

if (typeof marked.parse === 'function') {
    var md = marked.parse('**bold** and `code`');
    L('5. marked.parse test = ' + md);
} else {
    L('5. ERROR: marked.parse is not a function!');
    L('   marked keys: ' + Object.keys(marked).join(', '));
}

if (typeof katex.renderToString === 'function') {
    var k = katex.renderToString('x^2', { throwOnError: false });
    L('6. katex test = ' + (k.length > 0 ? 'OK (' + k.length + ' chars)' : 'EMPTY'));
} else {
    L('6. ERROR: katex.renderToString is not a function!');
}

// Full pipeline test
var text = '인라인 수식 \\(ax^2+bx+c=0\\) 그리고 블록:\n\\[\nx = \\frac{-b}{2a}\n\\]';
L('\n=== Full Pipeline Test ===');
L('Input: ' + text.substring(0, 60) + '...');

try {
    var blockMath = [], inlineMath = [];
    text = text.replace(/\\\[([\s\S]*?)\\\]/g, function(m,f){ blockMath.push(f.trim()); return '%%BLOCKMATH'+(blockMath.length-1)+'%%'; });
    text = text.replace(/\\\(([\s\S]*?)\\\)/g, function(m,f){ inlineMath.push(f.trim()); return '%%INLINEMATH'+(inlineMath.length-1)+'%%'; });
    L('Extracted: ' + blockMath.length + ' block, ' + inlineMath.length + ' inline');

    var html = marked.parse(text);
    L('Marked output length: ' + html.length);

    html = html.replace(/%%BLOCKMATH(\d+)%%/g, function(m,i){
        return '<span class="katex-block">'+katex.renderToString(blockMath[parseInt(i)],{displayMode:true,throwOnError:false})+'</span>';
    });
    html = html.replace(/%%INLINEMATH(\d+)%%/g, function(m,i){
        return '<span class="katex-inline">'+katex.renderToString(inlineMath[parseInt(i)],{displayMode:false,throwOnError:false})+'</span>';
    });

    L('Final HTML length: ' + html.length);
    L('\n=== PASS ===');
    result.innerHTML = html;
} catch(e) {
    L('ERROR: ' + e.message);
    L('\n=== FAIL ===');
}
</script>
</body></html>
